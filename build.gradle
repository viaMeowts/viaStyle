plugins {
	id 'fabric-loom' version '1.15-SNAPSHOT'
}

group = project.maven_group
base.archivesName = project.archives_base_name
version = project.mod_version + "+mc" + project.minecraft_version

repositories {
	maven { url 'https://maven.fabricmc.net/' }
	maven { url 'https://maven.pb4.eu/release' }
    mavenCentral()
}

dependencies {
	minecraft "com.mojang:minecraft:${project.minecraft_version}"
	mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
	modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
	modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"

	// TextPlaceholderAPI is an optional runtime-only dependency resolved via reflection.
	// No compile-time dependency needed — loaded reflectively if present at runtime.

	// Vanish (DrexHD) — optional compile-time dependency.
	// Fabric Loom remaps Mojang→Yarn so VanishAPI classes align with our ServerPlayerEntity, etc.
	// VanishCompat.java is the entry point; it is only class-loaded when melius-vanish is present.
	// Jar downloaded from modrinth to libs/ so no external maven access is required at build time.
	modCompileOnly files('libs/vanish-1.6.6+1.21.10.jar')
}

processResources {
	inputs.property "version", project.version
	inputs.property "loader_version", project.loader_version
	inputs.property "minecraft_version", project.minecraft_version

	filesMatching("fabric.mod.json") {
		expand "version": project.version,
		       "loader_version": project.loader_version,
		       "minecraft_version": project.minecraft_version
	}
}

tasks.withType(JavaCompile).configureEach {
	options.encoding = "UTF-8"
	options.release.set(21)
}

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(25)
	}
	withSourcesJar()
}

jar {
	from("LICENSE") {
		rename { "${it}_${base.archivesName.get()}"}
	}
}

artifacts {
 	archives sourcesJar
}
